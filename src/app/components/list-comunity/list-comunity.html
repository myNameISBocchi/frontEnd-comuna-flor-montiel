<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
    <h2 class="text-success fw-bold mb-0">
      <i class="fa-solid fa-city me-2"></i>GESTION DE COMUNAS
    </h2>
    <span class="badge bg-danger rounded-pill px-3 py-2 fs-6">
      {{comunity.length}} Comunidades Activas
    </span>
  </div>

  <div class="card border-0 shadow-sm mb-5">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-4 text-dark text-uppercase small ls-2">Nuevo Registro</h5>
      <form (submit)="createComunity($event)" class="row g-3 align-items-center">
        <div class="col-md-5">
          <div class="form-floating">
            <input type="text" class="form-control border-0 bg-light" id="comName" name="comunityName" placeholder="Nombre" required>
            <label for="comName">Nombre de la Comunidad</label>
          </div>
        </div>
        <div class="col-md-5">
          <div class="form-floating">
            <input type="text" class="form-control border-0 bg-light" id="comMaps" name="googleMaps" placeholder="Ubicación" required>
            <label for="comMaps">Coordenadas / Ubicación</label>
          </div>
        </div>
        <div class="col-md-2 d-grid">
          <button type="submit" class="btn btn-primary py-3 shadow-sm fw-bold">
            <i class="fa-solid fa-plus me-1"></i>Añadir
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="row">
    @for(item of comunity; track item.comunityId) {
      <div class="col-auto mb-4">
        <div class="comunity-card">
          <div class="img-wrapper">
            <img [src]="'http://localhost/app-back/public/' + item.photoComunity" alt="comunidad">
            <span class="verificado-badge">Verificado</span>
          </div>
          
          <div class="card-info">
            <h5 class="title">{{item.comunityName}}</h5>
            <p class="location">
              <i class="fa-solid fa-location-dot"></i> {{item.googleMaps}}
            </p>
          </div>

          <div class="card-actions">
            <button class="action-btn edit" data-bs-toggle="modal" data-bs-target="#editModal" (click)="openModalButton(item)">
              <i class="fa-solid fa-pen"></i>
            </button>
            
            <label [for]="'file-' + item.comunityId" class="action-btn view">
              <i class="fa-solid fa-camera"></i>
            </label>
            <input type="file" [id]="'file-' + item.comunityId" hidden (change)="onFileSelected($event, item.comunityId)">
            
            <button class="action-btn delete" (click)="deleteComunity(item.comunityId)">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
