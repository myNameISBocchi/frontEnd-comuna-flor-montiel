<div class="container mb-5">
    <div class="card border-primary shadow-lg bg-dark glass-card">
        <div class="card-body p-4">
            <h4 class="text-primary mb-4 d-flex align-items-center">
                <i class="fa-solid fa-circle-plus me-2"></i> Gestión de Comunidades
            </h4>
            <form (submit)="createComunity($event)" class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label text-info small uppercase fw-bold">Nombre de Comunidad</label>
                    <input type="text" class="form-control bg-black text-info border-info custom-input" name="comunityName" placeholder="Ej. Urbanización Neón" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label text-info small uppercase fw-bold">Coordenadas / Ubicación</label>
                    <input type="text" class="form-control bg-black text-info border-info custom-input" name="googleMaps" placeholder="Ej. Sector 4, Av. Principal" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100 shadow-neon py-2">
                        <i class="fa-solid fa-floppy-disk me-1"></i> Registrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-info pb-3">
        <h2 class="text-info m-0 italic">Comunidades Activas</h2>
        <span class="badge rounded-pill bg-info text-dark">{{comunity.length}} Registros</span>
    </div>

    <div class="row">
        @for(item of comunity; track item.comunityId){
            <div class="col-12 col-sm-6 col-lg-4 mb-4">
                <div class="card border-secondary h-100 bg-dark shadow-hover card-vapor">
                    <div class="image-container">
                        <img [src]="'http://localhost/app-back/public/' + item.photoComunity"
                             class="card-img-top" 
                             alt="comunidad">
                        <div class="image-overlay"></div>
                    </div>
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title text-warning text-uppercase ls-1 fw-black">{{item.comunityName}}</h5>
                        <p class="card-text text-light-emphasis flex-grow-1">
                            <i class="fa-solid fa-location-dot text-info me-2"></i>{{item.googleMaps}}
                        </p>

                        <div class="actions-grid mt-3">
                            <button type="button" class="btn btn-action btn-outline-danger" (click)='deleteComunity(item.comunityId)' title="Eliminar">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>

                            <div class="btn-upload-wrapper">
                                <label [for]="'file-' + item.comunityId" class="btn btn-action btn-outline-success m-0" title="Cambiar Imagen">
                                    <i class="fa-solid fa-camera"></i>
                                </label>
                                <input type="file" [id]="'file-' + item.comunityId" hidden (change)="onFileSelected($event, item.comunityId)">
                            </div>

                            <button type="button" class="btn btn-action btn-outline-info"
                                    data-bs-toggle="modal" data-bs-target="#editModal"
                                    (click)="openModalButton(item)" title="Editar">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        }@empty{
            <div class="col-12 text-center py-5">
                <div class="alert bg-black border-warning text-warning shadow-neon-warning py-4">
                    <i class="fa-solid fa-triangle-exclamation fa-3x mb-3"></i>
                    <h4 class="alert-heading ls-2">BASE DE DATOS VACÍA</h4>
                    <p class="mb-0">No se detectan señales en el sector. Inicie un nuevo registro.</p>
                </div>
            </div>
        }
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-info shadow-neon">
            <div class="modal-header border-info">
                <h5 class="modal-title text-info" id="editModalLabel">Actualizar Comunidad</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form (submit)="updateComunity($event)" *ngIf="comunitySelect">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-warning small fw-bold">Nombre de Comunidad</label>
                        <input type="text" class="form-control bg-black text-info border-info" 
                               [(ngModel)]="comunitySelect.comunityName" name="comunityName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-warning small fw-bold">Coordenadas / Ubicación</label>
                        <input type="text" class="form-control bg-black text-info border-info" 
                               [(ngModel)]="comunitySelect.googleMaps" name="googleMaps" required>
                    </div>
                </div>
                <div class="modal-footer border-info">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary shadow-neon" data-bs-dismiss="modal">
                        Actualizar Datos
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
