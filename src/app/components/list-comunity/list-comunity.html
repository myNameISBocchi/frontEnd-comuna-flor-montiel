<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
    <h2 class="text-primary fw-bold mb-0">
      <i class="fa-solid fa-city me-2"></i>Gestión de Sectores
    </h2>
    <span class="badge bg-primary rounded-pill px-3 py-2 fs-6">
      {{comunity.length}} Comunidades Activas
    </span>
  </div>

  <div class="card border-0 shadow-sm mb-5">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-4 text-dark text-uppercase small ls-2">Nuevo Registro</h5>
      <form (submit)="createComunity($event)" class="row g-3 align-items-center">
        <div class="col-md-5">
          <div class="form-floating">
            <input type="text" class="form-control border-0 bg-light" id="comName" name="comunityName" placeholder="Nombre" required>
            <label for="comName">Nombre de la Comunidad</label>
          </div>
        </div>
        <div class="col-md-5">
          <div class="form-floating">
            <input type="text" class="form-control border-0 bg-light" id="comMaps" name="googleMaps" placeholder="Ubicación" required>
            <label for="comMaps">Coordenadas / Ubicación</label>
          </div>
        </div>
        <div class="col-md-2 d-grid">
          <button type="submit" class="btn btn-primary py-3 shadow-sm fw-bold">
            <i class="fa-solid fa-plus me-1"></i>Añadir
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="row">
    @for(item of comunity; track item.comunityId) {
      <div class="col-md-6 col-lg-4 mb-4">
        <div class="card h-100 border-0 shadow-sm rounded-3 overflow-hidden">
          <div class="position-relative">
            <img [src]="'http://localhost/app-back/public/' + item.photoComunity" 
                 class="card-img-top" style="height: 180px; object-fit: cover;" alt="comunidad">
            <span class="badge bg-success position-absolute top-0 end-0 m-3">Verificado</span>
          </div>
          
          <div class="card-body p-4">
            <h5 class="card-title fw-bold text-dark mb-2">{{item.comunityName}}</h5>
            <p class="text-muted small mb-4">
              <i class="fa-solid fa-location-dot me-2 text-danger"></i>{{item.googleMaps}}
            </p>

            <div class="d-flex gap-2 border-top pt-3">
              <button class="btn btn-info btn-sm flex-grow-1 text-white shadow-sm" 
                      data-bs-toggle="modal" data-bs-target="#editModal" (click)="openModalButton(item)">
                <i class="fa-solid fa-pen me-1"></i>Editar
              </button>
              
              <label [for]="'file-' + item.comunityId" class="btn btn-outline-secondary btn-sm shadow-sm">
                <i class="fa-solid fa-camera"></i>
              </label>
              <input type="file" [id]="'file-' + item.comunityId" hidden (change)="onFileSelected($event, item.comunityId)">
              
              <button class="btn btn-outline-danger btn-sm shadow-sm" (click)="deleteComunity(item.comunityId)">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    } @empty {
      <div class="col-12 text-center py-5">
        <div class="p-5 bg-white rounded-3 shadow-sm">
          <i class="fa-solid fa-magnifying-glass fa-3x text-light mb-3"></i>
          <h4 class="text-muted">No se encontraron registros</h4>
        </div>
      </div>
    }
  </div>
</div>
