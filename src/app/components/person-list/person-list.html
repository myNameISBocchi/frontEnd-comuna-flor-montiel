<div class="container-fluid px-3 px-md-4 py-3">
    <div class="row mb-4">
        <div class="col-12 col-md-6 mx-auto">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                    <i class="fas fa-search text-muted"></i>
                </span>
                <input 
                    type="text" 
                    class="form-control border-start-0 ps-0"
                    [(ngModel)]="searchTerm" 
                    (input)="onSearch()" 
                    placeholder="Buscar vocero..."
                    style="box-shadow: none;">
            </div>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-12 text-end">
            <button class="btn btn-success btn-sm">
                <i class="fas fa-plus me-1"></i> Registrar
            </button>
        </div>
    </div>

    <div class="row g-3">
        <div *ngFor="let person of filteredPeoples" class="col-6 col-sm-4 col-md-3 col-lg-2">
            <div class="card h-100 shadow-sm">
                <div class="card-image-wrapper position-relative" (click)="fileInput.click()" style="cursor: pointer;">
                    <img 
                        [src]="person.photoPerson ? 'http://localhost/app-back/public/' + person.photoPerson : 'assets/img/default-avatar.png'" 
                        [alt]="person.firstName" 
                        class="card-img-top"
                        (error)="handleImageError($event)"
                        style="height: 150px; object-fit: cover; width: 100%;">
                    <div class="overlay-edit position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" 
                         style="background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;">
                        <i class="fas fa-camera text-white fs-4"></i>
                    </div>
                </div>

                <input #fileInput type="file" (change)="onFileSelected($event, person.personId)" style="display: none">

                <div class="card-body p-2">
                    <p class="mb-1 small"><strong>Nombre:</strong> {{ person.firstName }}</p>
                    <p class="mb-1 small"><strong>Comunidad:</strong> {{ person.comunityName || 'N/A' }}</p>
                    <p class="mb-1 small"><strong>Consejo:</strong> {{ person.councilName || 'N/A' }}</p>
                    <p class="mb-1 small"><strong>Comite:</strong> {{ person.committeeName || 'N/A' }}</p>
                    <p class="mb-1 small"><strong>Ubicación:</strong> {{ person.locality?.state || 'N/A' }}</p>
                    <p class="mb-0 small"><strong>Rol:</strong> {{ person.roleName || 'N/A' }}</p>
                </div>

                <div class="card-footer bg-white p-0 d-flex">
                    <button class="btn btn-light btn-sm flex-grow-1 rounded-0 border-end" (click)="fileInput.click()">
                        <i class="fas fa-image"></i>
                    </button>
                    <button class="btn btn-light btn-sm flex-grow-1 rounded-0 text-danger" (click)="deletePerson(person.personId)">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.card-image-wrapper:hover .overlay-edit {
    opacity: 1 !important;
}
.card {
    transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important;
}
.btn-light {
    background-color: #f8f9fa;
}
.btn-light:hover {
    background-color: #e9ecef;
}
</style>
